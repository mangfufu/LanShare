<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>图片局部模糊工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="/tool-skins.css">
  <link rel="stylesheet" href="/ui-controls.css">
</head>
<body>
  <main class="app-shell">
    <section id="imageDropZone" class="drop-zone" tabindex="0">
      <input id="imageInput" type="file" accept="image/*" hidden>
      <p class="drop-title">拖拽图片到此处</p>
      <p class="drop-subtitle">或点击选择文件导入</p>
    </section>

    <section id="imageNotice" class="notice hidden" aria-live="polite"></section>

    <div class="workspace">
      <div class="workspace-left">
        <section class="panel">
          <div class="panel-head">
            <h2>处理设置</h2>
            <span id="imageMeta" class="meta-text">未加载图片</span>
          </div>

          <div class="form-grid">
            <label>
              <span class="label">笔刷大小</span>
              <input id="brushSizeInput" type="range" min="8" max="220" step="1" value="72">
              <span id="brushSizeValue" class="meta-text">72 px</span>
            </label>
            <label>
              <span class="label">模糊强度</span>
              <input id="blurInput" type="range" min="8" max="40" step="1" value="22">
              <span id="blurValue" class="meta-text">22 px</span>
            </label>
            <label>
              <span class="label">透明度</span>
              <input id="opacityInput" type="range" min="0.35" max="1" step="0.05" value="1">
              <span id="opacityValue" class="meta-text">100%</span>
            </label>
          </div>

          <div class="toggle-row" role="group" aria-label="蒙版工具">
            <button id="drawModeButton" class="button ghost active-tool tool-mode-button" type="button" aria-pressed="true">绘制蒙版</button>
            <button id="eraseModeButton" class="button ghost tool-mode-button" type="button" aria-pressed="false">橡皮擦</button>
          </div>

          <div class="button-row" style="margin-top:14px">
            <button id="clearMaskButton" class="button ghost" type="button" disabled>清空蒙版</button>
            <button id="exportImageButton" class="button primary" type="button" disabled>导出图片</button>
          </div>
        </section>
      </div>

      <div class="workspace-right">
        <section class="panel preview-section">
          <div class="panel-head">
            <h2>实时预览</h2>
            <div class="panel-head-actions">
              <a href="./index.html" class="mini-tool-button" style="text-decoration:none">← 返回</a>
              <button id="undoButton" class="mini-tool-button" type="button" disabled>撤销</button>
              <button id="redoButton" class="mini-tool-button" type="button" disabled>重做</button>
              <span id="canvasMeta" class="meta-text">等待图片</span>
            </div>
          </div>
          <div id="blurCanvasWrap" class="canvas-wrap">
            <canvas id="previewCanvas" width="1200" height="800" aria-label="图片预览画布"></canvas>
            <canvas id="maskCanvas" class="hidden-mask-canvas" width="1200" height="800" aria-hidden="true"></canvas>
            <canvas id="guideCanvas" class="overlay-canvas" width="1200" height="800" aria-label="蒙版绘制画布"></canvas>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>!function(){function s(){try{var pb=window.parent.document.body,p=pb.style,d=document.body.style,list=["--bg","--panel","--panel-strong","--panel-soft","--panel-hover","--line","--text","--muted","--accent","--accent-2","--accent-text","--floating-bg","--floating-text","--paper-deep","--ink-soft","--line-soft","--s-blue","--s-amber","--s-green","--danger","--success"];for(var i=0;i<list.length;i++){var v=p.getPropertyValue(list[i]);if(v)d.setProperty(list[i],v)}document.body.dataset.uiStyle=new URLSearchParams(location.search).get("style")||pb.dataset.uiStyle||"classic";document.body.dataset.theme=pb.dataset.theme||"light";d.colorScheme=document.body.dataset.theme}catch(e){}}s();var o=new MutationObserver(s);try{o.observe(window.parent.document.body,{attributes:true,attributeFilter:["style","data-ui-style","data-theme"]})}catch(e){}}()</script>
  <script src="./media-store.js"></script>
  <script src="./image-blur.js"></script>
</body>
</html>
