<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>视频截帧工具</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <!-- Drop zone -->
    <section id="dropZone" class="drop-zone" tabindex="0">
      <input id="videoInput" type="file" accept="video/*" multiple hidden>
      <p class="drop-title">拖拽视频到此处</p>
      <p class="drop-subtitle">或点击选择文件批量导入</p>
    </section>

    <section id="notice" class="notice hidden" aria-live="polite"></section>

    <div class="workspace">
      <div class="workspace-left">
        <section class="panel list-panel">
          <div class="panel-head">
            <h2>视频列表</h2>
            <div class="panel-head-actions">
              <button id="selectAllButton" class="mini-tool-button" type="button" disabled>全选</button>
              <button id="invertSelectButton" class="mini-tool-button" type="button" disabled>反选</button>
              <button id="batchDeleteButton" class="mini-tool-button" type="button" disabled>删除选中</button>
            </div>
          </div>
          <span id="libraryMeta" class="meta-text" style="margin-bottom:8px;display:block">未导入视频</span>
          <div id="videoList" class="video-list empty">
            <p class="empty-state">导入后会显示在这里</p>
          </div>
        </section>

        <section class="panel list-panel">
          <div class="panel-head">
            <h2>帧标记</h2>
            <div class="panel-head-actions">
              <button id="markerSelectAllButton" class="mini-tool-button" type="button" disabled>全选</button>
              <button id="markerInvertSelectButton" class="mini-tool-button" type="button" disabled>反选</button>
            </div>
          </div>
          <span id="markerMeta" class="meta-text" style="margin-bottom:8px;display:block">当前无标记</span>
          <div id="markerList" class="marker-list empty">
            <p class="empty-state">在时间轴定位后点击「添加帧标记」</p>
          </div>
        </section>
      </div>

      <div class="workspace-right">
        <section class="panel player-section">
          <div class="panel-head">
            <h2>视频预览</h2>
            <span id="fileMeta" class="meta-text">未选择视频</span>
          </div>
          <div id="videoWrap" class="video-wrap">
            <video id="video" controls playsinline preload="metadata"></video>
          </div>
        </section>

        <section class="panel preview-section">
          <div class="panel-head">
            <h2>当前帧预览</h2>
            <span id="frameInfo" class="meta-text">尚未截帧</span>
          </div>
          <div id="canvasWrap" class="canvas-wrap">
            <canvas id="frameCanvas" width="1280" height="720" aria-label="当前帧画布"></canvas>
          </div>
        </section>

        <section class="panel ops-section">
          <div class="panel-head">
            <h2>帧操作</h2>
            <div class="panel-head-actions">
              <button id="sendToMaskButton" class="mini-tool-button" type="button" disabled>发送到蒙版</button>
            </div>
          </div>

          <div class="timeline-wrap">
            <label for="timeline" class="label">时间轴</label>
            <input id="timeline" type="range" min="0" max="0" value="0" step="0.01" disabled>
            <div class="time-row">
              <span id="currentTimeLabel">00:00.00</span>
              <span id="durationLabel">00:00.00</span>
            </div>
          </div>

          <div class="form-grid">
            <label>
              <span class="label">输出格式</span>
              <select id="formatSelect"><option value="png">PNG</option><option value="jpg">JPG</option></select>
            </label>
            <label>
              <span class="label">文件名前缀</span>
              <input id="prefixInput" type="text" value="frame">
            </label>
          </div>

          <div class="button-row">
            <button id="addMarkerButton" class="button ghost" type="button" disabled>添加帧标记</button>
            <button id="exportMarkedButton" class="button primary" type="button" disabled>下载已标记帧</button>
            <button id="clearMarkersButton" class="button ghost" type="button" disabled>清空标记</button>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>!function(){function s(){try{var p=window.parent.document.body.style,d=document.body.style,list=["--bg","--panel","--panel-strong","--panel-soft","--panel-hover","--line","--text","--muted","--accent","--floating-bg","--floating-text"];for(var i=0;i<list.length;i++){var v=p.getPropertyValue(list[i]);if(v)d.setProperty(list[i],v)}}catch(e){}}s();var o=new MutationObserver(s);try{o.observe(window.parent.document.body,{attributes:true,attributeFilter:["style"]})}catch(e){}}()</script>
  <script src="./media-store.js"></script>
  <script src="./app.js"></script>
</body>
</html>
