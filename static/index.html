<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>局域网文件服务器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/skins.css" />
  </head>
  <body>
    <script>document.body.dataset.uiStyle = "editorial";</script>
    <div class="version-badge">
      <span id="nicknameDisplay" class="nickname" title="点击修改昵称">设置昵称</span>
      <span class="sep">·</span>
      v3.0.0
    </div>

    <div id="floatControl" class="float-control is-hidden">
      <div class="float-side left">
        <input type="range" id="floatSizeSlider" min="20" max="200" value="200" />
        <span class="float-label">Aa</span>
      </div>
      <div class="float-side right">
        <input type="range" id="floatSpeedSlider" min="0.5" max="10" step="0.5" value="10" />
        <span class="float-label">速度</span>
      </div>
    </div>

    <main class="page">
      <div class="tab-bar">
        <button class="tab active" data-tab="files">文件管理</button>
        <button class="tab" data-tab="audio">音频处理</button>
        <button class="tab" data-tab="video">视频截帧</button>
      </div>

      <!-- 文件管理 -->
      <div class="tab-content active" id="tab-files">
      <section class="panel">
        <div id="breadcrumb" class="breadcrumb"></div>
        <input id="mainSearchInput" class="field toolbar-search" type="search" placeholder="搜索文件..." />
        <div class="toolbar">
          <div class="toolbar-actions-left">
            <div class="upload-group">
              <button id="uploadBtn" class="button primary" type="button">上传</button>
              <div id="uploadMenu" class="upload-menu">
                <label class="upload-menu-item">上传文件<input id="fileInput" type="file" multiple hidden /></label>
                <label class="upload-menu-item">上传文件夹<input id="folderInput" type="file" webkitdirectory directory multiple hidden /></label>
              </div>
            </div>
            <button id="mkdirBtn" class="button warm" type="button">新建文件夹</button>
            <button id="createProjectBtn" class="button warm" type="button">新建项目</button>
            <div class="filter-switch" id="filterSwitch">
              <button id="filterSwitchBtn" class="button ghost" type="button">全部</button>
              <div id="filterSwitchMenu" class="filter-switch-menu is-hidden">
                <button class="filter-opt" data-value="all">全部</button>
                <button class="filter-opt" data-value="not_started">待开始</button>
                <button class="filter-opt" data-value="in_progress">进行中</button>
                <button class="filter-opt" data-value="completed">已完成</button>
              </div>
            </div>
          </div>
          <div class="toolbar-actions-right">
            <button id="upDirBtn" class="button ghost is-hidden" type="button">返回上级</button>
            <button id="refreshBtn" class="button ghost" type="button">刷新</button>
            <div id="selectionTools" class="selection-tools" aria-label="选择操作"></div>
            <div class="view-switch" aria-label="视图切换">
              <button id="listViewBtn" class="button ghost is-active" type="button">列表</button>
              <button id="gridViewBtn" class="button ghost" type="button">宫格</button>
            </div>
            <div id="selectionSummary" class="selection-summary toolbar-selection-summary">已选 0 项</div>
          </div>
        </div>
        <div id="message" class="message"></div>
        <div id="uploadProgress" class="upload-progress is-hidden">
          <div class="upload-progress-head">
            <span id="uploadProgressText">准备上传...</span>
            <span id="uploadSpeed" class="upload-speed"></span>
            <span id="uploadProgressPercent">0%</span>
          </div>
          <div class="upload-progress-bar">
            <div id="uploadProgressFill" class="upload-progress-fill"></div>
          </div>
        </div>
        <div id="uploadQueue" class="upload-queue is-hidden"></div>
        <div id="tableView" class="table-wrap">
          <table>
            <colgroup>
              <col class="col-name" />
              <col class="col-size" />
              <col class="col-time" />
              <col class="col-type" />
              <col class="col-actions" />
            </colgroup>
            <thead>
              <tr>
                <th class="sort-th" data-sort="name" data-resize-column="name">名称</th>
                <th class="sort-th" data-sort="size" data-resize-column="size">大小</th>
                <th class="sort-th" data-sort="date" data-resize-column="date">修改时间</th>
                <th>类型</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="fileTableBody"></tbody>
          </table>
        </div>
        <div id="gridView" class="grid-view is-hidden"></div>
      </section>
      </div>

      <!-- 音频处理 -->
      <div class="tab-content" id="tab-audio">
        <section class="panel tool-panel">
          <iframe src="/tools/audio/index.html" class="tool-iframe" allow="microphone"></iframe>
        </section>
      </div>

      <!-- 视频截帧 -->
      <div class="tab-content" id="tab-video">
        <section class="panel tool-panel">
          <iframe src="/tools/video/index.html" class="tool-iframe"></iframe>
        </section>
      </div>

    </main>

    <button id="logToggleBtn" class="log-toggle" type="button" title="日志">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </button>
    <button id="hideUiBtn" class="recycle-toggle" type="button" title="隐藏界面，纯享背景" aria-label="隐藏界面">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
    <button id="bgUploadBtn" class="recycle-toggle" type="button" title="左键上传背景 / 右键清除背景">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <input id="bgFileInput" type="file" accept="image/*,video/*" hidden />
    <div id="bgOverlay" class="bg-overlay"></div>
    <button id="themeToggleBtn" class="theme-toggle" type="button" title="切换到夜间模式">
      <svg class="tgl-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="tgl-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button id="recycleToggleBtn" class="recycle-toggle" type="button" title="回收站">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      <span id="recycleCountBadge">0</span>
    </button>

    <!-- 拖拽取消区域 -->
    <div id="dragCancelZone" class="drag-cancel-zone is-hidden">
      <strong>取消移动</strong>
      <span>拖到这里松手，本次移动不会执行</span>
    </div>

    <aside id="logPanel" class="log-panel is-hidden">
      <div class="log-header">
        <span class="log-title">操作记录</span>
        <button id="closeLogBtn" class="button ghost" type="button">关闭</button>
      </div>
      <div id="logList" class="log-list">
        <div class="log-empty">暂无记录</div>
      </div>
    </aside>

    <aside id="recycleDrawer" class="recycle-drawer is-hidden">
      <div class="recycle-header">
        <div>
          <div class="label">回收站</div>
          <div class="recycle-title">已删除项目</div>
        </div>
        <button id="closeRecycleBtn" class="button ghost" type="button">关闭</button>
      </div>
      <div class="recycle-tools">
        <input id="recycleSearchInput" class="field" type="search" placeholder="搜索回收站" />
        <div class="recycle-select-actions">
          <button id="recycleSelectAllBtn" class="button ghost" type="button">全选</button>
          <button id="recycleInvertSelectionBtn" class="button ghost" type="button">反选</button>
        </div>
        <div class="recycle-batch-actions">
          <span id="recycleSelectedCount" class="selection-count">已选 0 项</span>
          <button id="recycleRestoreSelectedBtn" class="button ghost" type="button" disabled>批量恢复</button>
          <button id="recycleDeleteSelectedBtn" class="button ghost danger-button" type="button" disabled>批量彻底删除</button>
        </div>
      </div>
      <div id="recycleMessage" class="message"></div>
      <div id="recycleList" class="recycle-list"></div>
    </aside>

    <dialog id="previewDialog" class="preview-dialog">
      <div class="preview-header">
        <div>
          <div class="label">预览文件</div>
          <div id="previewTitle" class="preview-title"></div>
        </div>
        <button id="closePreviewBtn" class="button ghost" type="button">关闭</button>
      </div>
      <div id="previewBody" class="preview-body"></div>
      <div class="preview-footer">
        <button id="previewPrevBtn" class="button ghost" type="button" disabled>◀ 上一张</button>
        <span id="previewCounter" class="preview-counter"></span>
        <button id="previewNextBtn" class="button ghost" type="button" disabled>下一张 ▶</button>
      </div>
    </dialog>

    <!-- 聊天面板（测试阶段默认显示） -->
    <aside id="chatPanel" class="chat-panel is-hidden">
      <div class="chat-head">
        <span class="chat-title">聊天</span>
        <button id="chatCloseBtn" class="button ghost" type="button">✕</button>
      </div>
      <div id="chatList" class="chat-list"></div>
      <div class="chat-input-row">
        <input id="chatInput" class="chat-input" type="text" placeholder="写点啥…" maxlength="500" autocomplete="off" />
        <button id="chatSendBtn" class="chat-send" type="button">发</button>
      </div>
    </aside>

    <template id="rowTemplate">
      <tr>
        <td class="name-cell"></td>
        <td class="size-cell"></td>
        <td class="time-cell"></td>
        <td class="type-cell"></td>
        <td class="op-cell"></td>
      </tr>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
