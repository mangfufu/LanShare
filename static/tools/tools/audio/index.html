<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频处理工具</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <!-- Import -->
    <section class="panel" style="padding:0;flex:none;overflow:visible">
      <label id="uploadBox" class="upload-box" for="audioInput">
        <input id="audioInput" type="file" accept="audio/*,video/*" multiple>
        <span>选择音频或视频文件</span>
        <small>支持多选，也可拖拽</small>
      </label>
    </section>

    <div class="workspace">
      <!-- Left -->
      <div class="col-left">
        <section class="panel list-panel">
          <div class="panel-head">
            <h2>文件列表</h2>
          </div>
          <div id="fileList" class="file-list empty-state">尚未导入文件</div>
        </section>

        <section class="panel" style="flex:none">
          <div class="panel-head">
            <h2>合并</h2>
          </div>
          <div id="mergeList" class="merge-list empty-state">至少导入两个文件后再合并</div>
          <button id="mergeBtn" class="button primary" type="button" style="margin-top:12px;width:100%">合并所选文件</button>
        </section>
      </div>

      <!-- Right -->
      <div class="col-right">
        <section class="panel" style="flex:none">
          <div class="panel-head">
            <h2>编辑</h2>
          </div>

          <div class="source-bar">
            <label class="source-select-field">
              <span class="label">源文件</span>
              <select id="sourceSelect"></select>
            </label>
            <div class="source-meta">
              <span id="sourceDuration">--</span>
              <span class="sep">|</span>
              <span id="sourceRate">--</span>
              <span class="sep">|</span>
              <span id="sourceChannels">--</span>
            </div>
          </div>

          <video id="videoPreview" class="video-preview" controls hidden></video>

          <div class="trim-section">
            <div class="dual-slider">
              <div class="dual-slider-track">
                <div class="dual-slider-fill" id="rangeFill"></div>
              </div>
              <input type="range" id="rangeStart" class="dual-slider-range" min="0" max="0" step="0.01" value="0">
              <input type="range" id="rangeEnd" class="dual-slider-range" min="0" max="0" step="0.01" value="0">
            </div>
            <div class="trim-inputs">
              <input id="trimStart" type="number" min="0" step="0.01" value="0" style="text-align:center">
              <span class="trim-dash">—</span>
              <input id="trimEnd" type="number" min="0" step="0.01" value="0" style="text-align:center">
            </div>
          </div>

          <div class="effect-bar">
            <label class="speed-field">
              <span class="label">速度</span>
              <div class="speed-row">
                <input id="speedControl" type="range" min="0.5" max="2" step="0.05" value="1">
                <strong id="speedValue">1.00x</strong>
              </div>
            </label>
            <label class="checkbox-field">
              <input id="reverseToggle" type="checkbox">
              <span>倒放</span>
            </label>
          </div>

          <div class="action-row">
            <button id="processSingleBtn" class="button primary" type="button">生成处理结果</button>
            <button id="previewSingleBtn" class="button ghost" type="button">预览原始音频</button>
          </div>
        </section>

        <section class="panel" style="flex:none">
          <div class="panel-head">
            <h2>导出</h2>
          </div>
          <div class="export-body">
            <input id="resultFileName" type="text" placeholder="暂无输出结果" value="">
            <audio id="resultPlayer" controls></audio>
            <div class="export-bar">
              <select id="formatSelect">
                <option value="wav">WAV</option>
                <option value="mp3">MP3</option>
                <option value="flac">FLAC</option>
                <option value="webm">WebM (Opus)</option>
              </select>
              <button id="downloadBtn" class="button primary" type="button" disabled>下载</button>
              <button id="clearResultBtn" class="button ghost" type="button">清空</button>
            </div>
          </div>
        </section>
      </div>
    </div>

    <p id="statusMessage" class="status">准备就绪</p>
  </main>

  <script>!function(){function s(){try{var p=window.parent.document.body.style,d=document.body.style,list=["--bg","--panel","--panel-strong","--panel-soft","--panel-hover","--line","--text","--muted","--accent","--floating-bg","--floating-text"];for(var i=0;i<list.length;i++){var v=p.getPropertyValue(list[i]);if(v)d.setProperty(list[i],v)}}catch(e){}}s();var o=new MutationObserver(s);try{o.observe(window.parent.document.body,{attributes:true,attributeFilter:["style"]})}catch(e){}}()</script>
  <script src="./app.js"></script>
</body>
</html>
